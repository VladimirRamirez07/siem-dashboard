<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEM Dashboard - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0e1a;
            color: #e0e6ff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: linear-gradient(135deg, #0d1b2a, #1a2744);
            border: 1px solid #1e3a5f;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .shield { font-size: 3rem; display: block; margin-bottom: 12px; }

        h1 {
            font-size: 1.8rem;
            color: #4fc3f7;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle { color: #7a9cc5; font-size: 0.85rem; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            color: #7a9cc5;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: #0a0e1a;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0e6ff;
            font-size: 0.95rem;
            transition: border-color 0.3s;
            outline: none;
        }

        input:focus { border-color: #4fc3f7; }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #1565c0, #0d47a1);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #1e88e5;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #1976d2, #1565c0);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(21,101,192,0.4);
        }

        .error {
            background: rgba(244,67,54,0.1);
            border: 1px solid #f44336;
            border-radius: 8px;
            padding: 10px 14px;
            color: #f44336;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .demo-credentials {
            margin-top: 24px;
            padding: 16px;
            background: rgba(79,195,247,0.05);
            border: 1px solid #1e3a5f;
            border-radius: 8px;
        }

        .demo-credentials p {
            color: #7a9cc5;
            font-size: 0.8rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cred-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .cred-row span { font-size: 0.85rem; }
        .cred-label { color: #7a9cc5; }
        .cred-value { color: #4fc3f7; font-family: monospace; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <span class="shield">🛡️</span>
            <h1>SIEM Dashboard</h1>
            <p class="subtitle">Security Information & Event Management</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">🔐 Sign In</button>
        </form>

        <div class="demo-credentials">
            <p>Demo Credentials</p>
            <div class="cred-row">
                <span class="cred-label">Admin:</span>
                <span class="cred-value">admin / admin123</span>
            </div>
            <div class="cred-row">
                <span class="cred-label">Analyst:</span>
                <span class="cred-value">analyst / analyst123</span>
            </div>
        </div>
    </div>
</body>
</html>
